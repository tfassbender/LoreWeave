# LoreWeave configuration
# Machine-specific overrides belong in application-local.properties (git-ignored).

loreweave.vault.remote=
loreweave.vault.local-path=./vault
loreweave.auth.token=
loreweave.sync.interval=5m

# Directory where LoreWeave writes log files.
# Relative paths resolve to the JVM working directory (user.dir). For the normal
# launch modes — ./gradlew quarkusDev, java -jar from the project root, or an
# IntelliJ Gradle run config — that is the project root, so ./logs lands at
# <project-root>/logs/. If you launch from anywhere else or deploy to the Linux
# server, override with an absolute path (e.g. /var/log/loreweave) in
# application-local.properties.
loreweave.logging.path=./logs

# Quarkus
quarkus.application.name=lore-weave
quarkus.http.port=4717

# Jackson — snake_case JSON field names, ISO-8601 timestamps (not numeric), omit null fields.
quarkus.jackson.property-naming-strategy=SNAKE_CASE
quarkus.jackson.write-dates-as-timestamps=false
quarkus.jackson.serialization-inclusion=non-null

# Logging — INFO and above to both console and a rotating file under loreweave.logging.path.
quarkus.log.level=INFO
quarkus.log.file.enable=true
quarkus.log.file.path=${loreweave.logging.path}/loreweave.log
quarkus.log.file.level=INFO
quarkus.log.file.rotation.max-file-size=10M
quarkus.log.file.rotation.max-backup-index=10
