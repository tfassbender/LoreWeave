# Test-profile overrides. Quarkus auto-loads src/test/resources/application.properties
# on top of src/main/resources/application.properties when running tests.

# Point the vault at the existing valid fixture so @QuarkusTest boots with real data.
loreweave.vault.remote=
loreweave.vault.local-path=src/test/resources/vault-valid

# Deterministic auth token for integration tests.
loreweave.auth.token=test-token-123

# Write logs under build/ so they don't pollute the working tree.
loreweave.logging.path=build/test-logs

# Use an ephemeral port to avoid collisions with a locally-running dev server.
quarkus.http.test-port=0
